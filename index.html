<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mawi's Diaaaaaaaaary</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fff5f8;
            color: #4d3040;
        }

        /* ==============================
           HEADER
        ============================== */

        header {
            background-color: #f7a8c4;
            padding: 35px 20px;
            text-align: center;
            border-bottom: 6px solid #e77ca4;
        }

        header h1 {
            margin: 0;
            color: white;
            font-size: 42px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px #c95f89;
        }

        header p {
            margin: 10px 0 0;
            color: white;
            font-size: 18px;
        }

        /* ==============================
           MAIN CALENDAR
        ============================== */

        main {
            width: 95%;
            max-width: 1300px;
            margin: 30px auto;
        }

        .calendar-title {
            text-align: center;
            color: #d85f8c;
            font-size: 32px;
            margin-bottom: 25px;
        }

        .calendar-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .month {
            background-color: white;
            border: 2px solid #f2a2bd;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 12px rgba(190, 79, 119, 0.15);
            overflow: hidden;
        }

        .month h2 {
            margin: -15px -15px 12px;
            padding: 12px;
            text-align: center;
            background-color: #ffd0df;
            color: #b74570;
            border-radius: 13px 13px 0 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th,
        td {
            border: 1px solid #f4c1d2;
            text-align: center;
            padding: 5px 2px;
            height: 52px;
        }

        th {
            background-color: #ffe4ed;
            color: #b74570;
            font-size: 13px;
        }

        td {
            position: relative;
            background-color: #fffafb;
            font-size: 14px;
            vertical-align: top;
        }

        .calendar-date {
            cursor: pointer;
            transition:
                background-color 0.2s,
                transform 0.2s;
        }

        .calendar-date:hover {
            background-color: #ffc8da;
            transform: scale(1.04);
            z-index: 2;
        }

        .date-number {
            display: block;
            margin-top: 3px;
            font-weight: bold;
        }

        .weekend {
            color: #dc477d;
        }

        /* Small indicator for dates with saved events */

        .event-indicator {
            display: none;
            width: 7px;
            height: 7px;
            margin: 5px auto 0;
            border-radius: 50%;
            background-color: #e25288;
        }

        .calendar-date.has-event {
            background-color: #ffe3ed;
        }

        .calendar-date.has-event .event-indicator {
            display: block;
        }

        .event-preview {
            display: block;
            margin-top: 3px;
            padding: 0 2px;
            color: #a83c65;
            font-size: 9px;
            line-height: 1.1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ==============================
           FOOTER
        ============================== */

        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            background-color: #f7a8c4;
            color: white;
        }

        /* ==============================
           EVENT MODAL
        ============================== */

        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: rgba(68, 30, 48, 0.35);
            backdrop-filter: blur(7px);
            -webkit-backdrop-filter: blur(7px);
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .event-modal {
            position: relative;
            width: 100%;
            max-width: 480px;
            padding: 30px;
            background-color: white;
            border: 3px solid #f3a2bf;
            border-radius: 22px;
            box-shadow: 0 20px 60px rgba(95, 35, 60, 0.35);
            animation: modalAppear 0.25s ease;
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .close-button {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 50%;
            background-color: #ffe1eb;
            color: #bd4d76;
            font-size: 23px;
            cursor: pointer;
        }

        .close-button:hover {
            background-color: #f8bad0;
        }

        .event-modal h2 {
            margin: 0;
            padding-right: 35px;
            color: #d75d8a;
            font-size: 27px;
        }

        .selected-date {
            margin: 6px 0 22px;
            color: #8c6473;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 17px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            color: #9f3e62;
            font-size: 14px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            border: 2px solid #f2bfd0;
            border-radius: 10px;
            padding: 11px;
            background-color: #fffafb;
            color: #4d3040;
            font-family: inherit;
            font-size: 15px;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #e2779e;
            box-shadow: 0 0 0 3px rgba(226, 119, 158, 0.16);
        }

        .form-group textarea {
            min-height: 110px;
            resize: vertical;
        }

        .button-container {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }

        .modal-button {
            flex: 1;
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .save-button {
            background-color: #df6d98;
        }

        .save-button:hover {
            background-color: #c95681;
        }

        .delete-button {
            background-color: #a88c97;
        }

        .delete-button:hover {
            background-color: #8d717c;
        }

        .status-message {
            min-height: 20px;
            margin-top: 14px;
            text-align: center;
            color: #bf4774;
            font-size: 14px;
            font-weight: bold;
        }

        /* ==============================
           RESPONSIVE DESIGN
        ============================== */

        @media screen and (max-width: 1000px) {
            .calendar-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media screen and (max-width: 650px) {
            header h1 {
                font-size: 29px;
            }

            .calendar-title {
                font-size: 26px;
            }

            .calendar-container {
                grid-template-columns: 1fr;
            }

            .event-modal {
                padding: 25px 20px;
            }

            .button-container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<!-- ===========================
     PASSWORD SCREEN
=========================== -->

<div id="lockScreen">

    <div class="lockBox">

<div class="flower">🌸</div>

<h1 style="
    text-align:center;
    font-size:48px;
    color:#e35f91;
    margin:0;
    margin-bottom:15px;
">
    Welcome!
</h1>

<h2 style="
    text-align:center;
    color:#c55582;
    margin-top:0;
">
    Mawi's Secret Diary
</h2>

<p style="text-align:center;">
    This diary belongs to Mawi.
</p>

        <input
            type="password"
            id="passwordInput"
            placeholder="Enter Password"
        >

        <button onclick="unlockDiary()">
            💗 Unlock Diary
        </button>

        <p id="wrongPassword"></p>

    </div>

</div>

<div id="diaryContent" style="display:none;">

<div id="pageContent">

        <header>
            <h1>mawi's calendar</h1>
            <p>akin to eh, bakit ba</p>
        </header>

        <main>
            <h2 class="calendar-title">My 2026 Calendar</h2>

            <div class="calendar-container" id="calendar"></div>
        </main>

        <footer>
            gorl, u got this! 💗
        </footer>

    </div>

    <!-- EVENT POP-UP WINDOW -->

    <div
        class="modal-overlay"
        id="modalOverlay"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
    >
        <div class="event-modal">

            <button
                class="close-button"
                id="closeModalButton"
                type="button"
                aria-label="Close event window"
            >
                &times;
            </button>

            <h2 id="modalTitle">Event Reminder</h2>

            <p class="selected-date" id="selectedDateText"></p>

            <div class="form-group">
                <label for="eventTitle">Event Title</label>

                <input
                    type="text"
                    id="eventTitle"
                    placeholder="Example: School Program"
                >
            </div>

            <div class="form-group">
                <label for="eventTime">Time</label>

                <input
                    type="time"
                    id="eventTime"
                >
            </div>

            <div class="form-group">
                <label for="eventReminder">Reminder or Notes</label>

                <textarea
                    id="eventReminder"
                    placeholder="Write the event details here..."
                ></textarea>
            </div>

            <div class="button-container">
                <button
                    class="modal-button save-button"
                    id="saveEventButton"
                    type="button"
                >
                    Save Event
                </button>

                <button
                    class="modal-button delete-button"
                    id="deleteEventButton"
                    type="button"
                >
                    Delete Event
                </button>
            </div>

            <div class="status-message" id="statusMessage"></div>

        </div>
    </div>

    <script>
        const year = 2026;

        const monthNames = [
            "January",
            "February",
            "March",
            "April",
            "May",
            "June",
            "July",
            "August",
            "September",
            "October",
            "November",
            "December"
        ];

        const dayNames = [
            "Sun",
            "Mon",
            "Tue",
            "Wed",
            "Thu",
            "Fri",
            "Sat"
        ];

        const calendarContainer =
            document.getElementById("calendar");

        const modalOverlay =
            document.getElementById("modalOverlay");

        const selectedDateText =
            document.getElementById("selectedDateText");

        const eventTitleInput =
            document.getElementById("eventTitle");

        const eventTimeInput =
            document.getElementById("eventTime");

        const eventReminderInput =
            document.getElementById("eventReminder");

        const saveEventButton =
            document.getElementById("saveEventButton");

        const deleteEventButton =
            document.getElementById("deleteEventButton");

        const closeModalButton =
            document.getElementById("closeModalButton");

        const statusMessage =
            document.getElementById("statusMessage");

        let selectedDateKey = "";

        /*
            Saved events are stored in the browser.

            This means the events remain saved even after
            the webpage is refreshed or reopened on the
            same browser and device.
        */

        let savedEvents = JSON.parse(
            localStorage.getItem("mawiDiaryEvents")
        ) || {};
savedEvents["2026-09-15"] = {
    title: "bertdey q 22222222222 <3",
    time: "12:00",
    reminder: "komaen k nng mabote ha,,,,, muwahh"
};

localStorage.setItem(
    "mawiDiaryEvents",
    JSON.stringify(savedEvents)
);
        function createDateKey(year, month, date) {
            const paddedMonth =
                String(month + 1).padStart(2, "0");

            const paddedDate =
                String(date).padStart(2, "0");

            return `${year}-${paddedMonth}-${paddedDate}`;
        }

        function formatTime(time) {
            if (!time) {
                return "";
            }

            const [hourString, minute] = time.split(":");

            let hour = Number(hourString);
            const period = hour >= 12 ? "PM" : "AM";

            hour = hour % 12 || 12;

            return `${hour}:${minute} ${period}`;
        }

        function createCalendar(year) {
            calendarContainer.innerHTML = "";

            for (let month = 0; month < 12; month++) {
                const monthBox =
                    document.createElement("section");

                monthBox.classList.add("month");

                const monthTitle =
                    document.createElement("h2");

                monthTitle.textContent = monthNames[month];

                monthBox.appendChild(monthTitle);

                const table =
                    document.createElement("table");

                const tableHeader =
                    document.createElement("thead");

                const headerRow =
                    document.createElement("tr");

                dayNames.forEach((day, index) => {
                    const heading =
                        document.createElement("th");

                    heading.textContent = day;

                    if (index === 0 || index === 6) {
                        heading.classList.add("weekend");
                    }

                    headerRow.appendChild(heading);
                });

                tableHeader.appendChild(headerRow);
                table.appendChild(tableHeader);

                const tableBody =
                    document.createElement("tbody");

                const firstDay =
                    new Date(year, month, 1).getDay();

                const totalDays =
                    new Date(year, month + 1, 0).getDate();

                let date = 1;

                for (let week = 0; week < 6; week++) {
                    const row =
                        document.createElement("tr");

                    for (let day = 0; day < 7; day++) {
                        const cell =
                            document.createElement("td");

                        const isBlankCell =
                            week === 0 && day < firstDay;

                        if (isBlankCell || date > totalDays) {
                            cell.textContent = "";
                        } else {
                            const currentDate = date;

                            const dateKey =
                                createDateKey(
                                    year,
                                    month,
                                    currentDate
                                );

                            cell.classList.add("calendar-date");

                            if (day === 0 || day === 6) {
                                cell.classList.add("weekend");
                            }

                            cell.dataset.dateKey = dateKey;
                            cell.dataset.year = year;
                            cell.dataset.month = month;
                            cell.dataset.date = currentDate;

                            const dateNumber =
                                document.createElement("span");

                            dateNumber.classList.add("date-number");
                            dateNumber.textContent = currentDate;

                            const eventPreview =
                                document.createElement("span");

                            eventPreview.classList.add("event-preview");

                            const eventIndicator =
                                document.createElement("span");

                            eventIndicator.classList.add(
                                "event-indicator"
                            );

                            cell.appendChild(dateNumber);
                            cell.appendChild(eventPreview);
                            cell.appendChild(eventIndicator);

                            cell.addEventListener(
                                "click",
                                () => {
                                    openEventModal(
                                        dateKey,
                                        year,
                                        month,
                                        currentDate
                                    );
                                }
                            );

                            date++;
                        }

                        row.appendChild(cell);
                    }

                    tableBody.appendChild(row);

                    if (date > totalDays) {
                        break;
                    }
                }

                table.appendChild(tableBody);
                monthBox.appendChild(table);
                calendarContainer.appendChild(monthBox);
            }

            updateCalendarEvents();
        }

        function openEventModal(
            dateKey,
            selectedYear,
            selectedMonth,
            selectedDate
        ) {
            selectedDateKey = dateKey;

            const fullDate = new Date(
                selectedYear,
                selectedMonth,
                selectedDate
            );

            selectedDateText.textContent =
                fullDate.toLocaleDateString(
                    "en-US",
                    {
                        weekday: "long",
                        year: "numeric",
                        month: "long",
                        day: "numeric"
                    }
                );

            const existingEvent =
                savedEvents[selectedDateKey];

            if (existingEvent) {
                eventTitleInput.value =
                    existingEvent.title || "";

                eventTimeInput.value =
                    existingEvent.time || "";

                eventReminderInput.value =
                    existingEvent.reminder || "";
            } else {
                eventTitleInput.value = "";
                eventTimeInput.value = "";
                eventReminderInput.value = "";
            }

            statusMessage.textContent = "";

            modalOverlay.classList.add("show");

            setTimeout(() => {
                eventTitleInput.focus();
            }, 100);
        }

        function closeEventModal() {
            modalOverlay.classList.remove("show");
            statusMessage.textContent = "";
        }

        function saveEvent() {
            const title =
                eventTitleInput.value.trim();

            const time =
                eventTimeInput.value;

            const reminder =
                eventReminderInput.value.trim();

            if (!title && !time && !reminder) {
                statusMessage.textContent =
                    "Please enter an event or reminder.";

                return;
            }

            savedEvents[selectedDateKey] = {
                title,
                time,
                reminder
            };

            localStorage.setItem(
                "mawiDiaryEvents",
                JSON.stringify(savedEvents)
            );

            updateCalendarEvents();

            statusMessage.textContent =
                "Event saved successfully! 💗";

            setTimeout(() => {
                closeEventModal();
            }, 700);
        }

        function deleteEvent() {
            if (!savedEvents[selectedDateKey]) {
                statusMessage.textContent =
                    "There is no saved event for this date.";

                return;
            }

            delete savedEvents[selectedDateKey];

            localStorage.setItem(
                "mawiDiaryEvents",
                JSON.stringify(savedEvents)
            );

            eventTitleInput.value = "";
            eventTimeInput.value = "";
            eventReminderInput.value = "";

            updateCalendarEvents();

            statusMessage.textContent =
                "Event deleted.";
        }

        function updateCalendarEvents() {
            const dateCells =
                document.querySelectorAll(".calendar-date");

            dateCells.forEach((cell) => {
                const dateKey =
                    cell.dataset.dateKey;

                const preview =
                    cell.querySelector(".event-preview");

                const event =
                    savedEvents[dateKey];

                cell.classList.remove("has-event");
                preview.textContent = "";

                if (event) {
                    cell.classList.add("has-event");

                    if (event.title && event.time) {
                        preview.textContent =
                            `${formatTime(event.time)} ${event.title}`;
                    } else if (event.title) {
                        preview.textContent = event.title;
                    } else if (event.time) {
                        preview.textContent =
                            formatTime(event.time);
                    } else {
                        preview.textContent = "Reminder";
                    }
                }
            });
        }

        saveEventButton.addEventListener(
            "click",
            saveEvent
        );

        deleteEventButton.addEventListener(
            "click",
            deleteEvent
        );

        closeModalButton.addEventListener(
            "click",
            closeEventModal
        );

        modalOverlay.addEventListener(
            "click",
            (event) => {
                if (event.target === modalOverlay) {
                    closeEventModal();
                }
            }
        );

        document.addEventListener(
            "keydown",
            (event) => {
                if (event.key === "Escape") {
                    closeEventModal();
                }
            }
        );

        createCalendar(year);
      function unlockDiary() {
        const enteredPassword =
            document.getElementById("passwordInput").value;

        if (enteredPassword === "060123") {
            document.getElementById("lockScreen").style.display = "none";
            document.getElementById("diaryContent").style.display = "block";
        } else {
            document.getElementById("wrongPassword").textContent =
                "Wrong password! Go away! 😤";
        }
    }

</script>

</body>
</html>
